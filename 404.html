<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>404 · 飞机坠毁了</title>
    <!-- 无按钮，纯视觉 + 轻微动效 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b1219;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            padding: 16px;
            margin: 0;
            /* 模拟驾驶舱失压氛围 */
            color: #e3e9f2;
        }

        .crash-wrapper {
            max-width: 720px;
            width: 100%;
            background: radial-gradient(ellipse at 50% 30%, #16222e 0%, #0a111a 90%);
            border-radius: 48px 24px 64px 32px;
            padding: 40px 28px 56px;
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 180, 80, 0.08),
                0 0 0 1px rgba(220, 140, 70, 0.15);
            backdrop-filter: blur(1px);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        /* 破损/划痕纹理 (纯css) */
        .crash-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                repeating-linear-gradient(45deg, rgba(200,120,60,0.02) 0px, rgba(10,20,35,0.04) 4px, transparent 6px),
                linear-gradient(135deg, rgba(230,150,70,0.03) 0%, transparent 40%),
                radial-gradient(circle at 75% 18%, rgba(210,130,50,0.06) 0%, transparent 30%);
            pointer-events: none;
            z-index: 0;
            border-radius: inherit;
        }

        /* 内容区都在上层 */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        /* 主视觉 —— 坠机残骸 + 烟雾 */
        .wreckage {
            margin: 0 auto 20px;
            width: 240px;
            height: 160px;
            position: relative;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.7));
        }

        .plane-debris {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* 机身残骸 — 断裂尾翼 + 倾斜机头 */
        .fuselage {
            position: absolute;
            bottom: 10px;
            left: 55px;
            width: 130px;
            height: 44px;
            background: linear-gradient(145deg, #5c6670 0%, #343d47 85%);
            border-radius: 0 60% 20% 0 / 0 80% 40% 0;
            transform: rotate(-18deg) skewX(-8deg);
            box-shadow: inset -8px -6px 0 rgba(0,0,0,0.3), inset 4px 4px 0 rgba(190,170,140,0.2);
            border-left: 3px solid #785a3a;
            border-bottom: 2px solid #966f42;
            z-index: 2;
        }

        .fuselage::after {
            content: '';
            position: absolute;
            top: -12px;
            right: -6px;
            width: 36px;
            height: 26px;
            background: #2e353f;
            clip-path: polygon(0% 0%, 100% 30%, 80% 100%, 0% 80%);
            transform: rotate(12deg);
            opacity: 0.7;
            box-shadow: inset -2px -2px 0 #161c24;
        }

        /* 机翼碎片 */
        .wing-left {
            position: absolute;
            bottom: 32px;
            left: 20px;
            width: 80px;
            height: 14px;
            background: #414b58;
            transform: rotate(38deg) skewX(16deg);
            border-radius: 2px 12px 4px 20px;
            box-shadow: inset 0 -2px 0 #222a33, 0 4px 6px rgba(0,0,0,0.5);
            z-index: 1;
            opacity: 0.9;
        }

        .wing-right {
            position: absolute;
            bottom: 8px;
            right: 15px;
            width: 72px;
            height: 13px;
            background: #37404b;
            transform: rotate(-62deg) skewY(-12deg);
            border-radius: 30% 4px 40% 8px;
            box-shadow: inset 0 -1px 0 #232b34, -2px 4px 8px rgba(0,0,0,0.6);
            z-index: 0;
            opacity: 0.85;
        }

        /* 发动机/火焰痕迹 */
        .engine-fire {
            position: absolute;
            bottom: -6px;
            left: 100px;
            width: 40px;
            height: 28px;
            background: radial-gradient(ellipse at 30% 40%, #ff8030 0%, #cc4400 70%, transparent 95%);
            border-radius: 60% 20% 80% 20%;
            filter: blur(3px);
            opacity: 0.65;
            mix-blend-mode: screen;
            animation: flicker 1.8s infinite alternate ease-in-out;
            z-index: 3;
        }

        .smoke-puff {
            position: absolute;
            bottom: 20px;
            left: 80px;
            width: 110px;
            height: 60px;
            background: radial-gradient(circle at 30% 60%, rgba(60,70,85,0.5) 0%, rgba(20,28,38,0.7) 80%);
            filter: blur(12px);
            border-radius: 50%;
            z-index: 0;
            opacity: 0.7;
            mix-blend-mode: hard-light;
        }

        .spark {
            position: absolute;
            bottom: 14px;
            left: 130px;
            width: 6px;
            height: 11px;
            background: #faa53b;
            border-radius: 40%;
            filter: blur(2px);
            box-shadow: 0 0 12px #f08830;
            animation: sparkle 0.9s infinite alternate;
            opacity: 0.7;
        }

        .spark-two {
            left: 108px;
            bottom: 2px;
            width: 5px;
            height: 8px;
            animation-delay: 0.4s;
            background: #ffbb55;
        }

        /* 黑烟轨迹 */
        .trail-smoke {
            position: absolute;
            top: -10px;
            right: -20px;
            width: 100px;
            height: 70px;
            background: radial-gradient(circle at 70% 30%, rgba(30,35,45,0.6) 0%, transparent 80%);
            filter: blur(16px);
            transform: rotate(12deg);
            opacity: 0.5;
            z-index: 0;
        }

        @keyframes flicker {
            0% { opacity: 0.5; transform: scale(0.95); filter: blur(3px); }
            100% { opacity: 0.8; transform: scale(1.05); filter: blur(5px); }
        }
        @keyframes sparkle {
            0% { opacity: 0.2; transform: translateY(0) scale(0.8); }
            100% { opacity: 0.9; transform: translateY(-6px) scale(1.2); }
        }

        /* 404 大字 — 破损风格 */
        .error-code {
            font-size: clamp(88px, 23vw, 148px);
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1;
            color: #ced8e2;
            text-shadow: 
                0 2px 0 #10161e,
                0 8px 16px rgba(0,0,0,0.7),
                0 0 0 1px #674d31,
                0 0 0 3px #402f1f,
                2px 6px 12px rgba(185, 115, 50, 0.2);
            transform: rotate(-1.5deg) scale(1.02);
            margin-top: 8px;
            word-break: keep-all;
            font-family: 'Impact', 'Arial Black', 'Segoe UI Black', sans-serif;
            filter: drop-shadow(0 6px 4px #00000066);
            position: relative;
            display: inline-block;
        }

        .error-code::before {
            content: '404';
            position: absolute;
            left: -4px;
            top: -4px;
            color: transparent;
            -webkit-text-stroke: 2px rgba(155, 105, 55, 0.2);
            z-index: -1;
            transform: rotate(2deg);
        }

        .sub-message {
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: 2px;
            margin: 4px 0 14px;
            color: #bbcbd9;
            text-shadow: 0 2px 6px black;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .sub-message span {
            background: rgba(169, 119, 73, 0.09);
            padding: 0 10px;
            border-left: 2px solid #ab784b;
            border-right: 2px solid #61492f;
            backdrop-filter: blur(2px);
            line-height: 1.4;
        }

        .description {
            font-size: 1rem;
            line-height: 1.7;
            max-width: 460px;
            margin: 18px auto 0;
            color: #afbfcf;
            background: rgba(0, 0, 0, 0.27);
            padding: 14px 18px;
            border-radius: 99px 16px 99px 16px;
            backdrop-filter: blur(2px);
            box-shadow: inset 0 0 0 1px rgba(215, 165, 100, 0.08);
            border-bottom: 1px solid #73583a;
            font-style: italic;
            word-break: break-word;
        }

        .description i {
            font-style: normal;
            background: rgba(195, 125, 55, 0.15);
            padding: 0 6px;
            border-radius: 12px;
        }

        /* 坠落地点坐标风格 */
        .coordinates {
            margin-top: 28px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: #8596a8;
            opacity: 0.7;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            border-top: 1px dashed rgba(175, 138, 98, 0.2);
            padding-top: 24px;
        }

        .coordinates span {
            background: #141e29;
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid #384652;
            box-shadow: inset 0 1px 0 #25323e;
        }

        /* 完全没有任何按钮，只有文字与图像 */
        .no-button-zone {
            pointer-events: none;
            user-select: none;
        }

        /* 响应式微调 */
        @media (max-width: 480px) {
            .crash-wrapper {
                padding: 28px 16px 46px;
                border-radius: 32px 16px 52px 20px;
            }
            .wreckage {
                width: 180px;
                height: 120px;
            }
            .sub-message {
                font-size: 1.3rem;
            }
            .description {
                font-size: 0.93rem;
                padding: 12px 16px;
            }
            .coordinates {
                font-size: 0.75rem;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
<div class="crash-wrapper no-button-zone">
    <div class="content">
        <!-- 坠机残骸区域 -->
        <div class="wreckage">
            <div class="plane-debris">
                <div class="fuselage"></div>
                <div class="wing-left"></div>
                <div class="wing-right"></div>
                <div class="engine-fire"></div>
                <div class="smoke-puff"></div>
                <div class="spark"></div>
                <div class="spark spark-two"></div>
                <div class="trail-smoke"></div>
            </div>
        </div>

        <!-- 404 标题 飞机坠毁了 -->
        <div class="error-code">404</div>
        
        <div class="sub-message">
            <span>✈︎ 飞机坠毁了</span>
        </div>

        <div class="description">
            <i>⚡ 信号中断 · 导航失效 ⚡</i><br>
            你寻找的跑道已经消失，<br>这架航班永远停留在了未知坐标。
        </div>

        <!-- 虚构的坠机坐标，增加氛围 -->
        <div class="coordinates">
            <span>N 37° 48' 32"</span>
            <span>E 122° 17' 43"</span>
            <span>ALT 0 FT</span>
        </div>

        <!-- 极简脚注 — 无按钮，仅有静态提示 -->
        <div style="margin-top: 22px; font-size: 0.68rem; opacity: 0.25; letter-spacing: 3px; border-top: 0; color: #788a9a;">
            ✦ 残骸散布 · 无人生还 ✦
        </div>
    </div>
</div>
<!-- 无任何交互按钮，无链接，无返回键 —— 纯粹404坠机场景 -->
</body>
</html>
